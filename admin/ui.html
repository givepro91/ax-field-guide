<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AX Field Guide — 콘텐츠 현황 (로컬)</title>
<style>
  :root { --bg:#f7f8fa; --card:#fff; --ink:#18181b; --sub:#52525b; --mute:#8a93a0;
    --accent:#2563eb; --accent-ink:#1d4ed8; --accent-weak:#eef4ff; --accent-border:#cfe0ff;
    --line:#e5e7eb; --ok:#047857; --ok-bg:#e7f8f1; --warn:#b45309; --warn-bg:#fef3c7;
    --sans:-apple-system,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    --mono:ui-monospace,Menlo,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; }
  .top { display:flex; align-items:center; gap:12px; padding:11px 22px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  .top b { font-family:var(--mono); font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; }
  .top .dot { color:var(--accent); }
  .top .badge { font-family:var(--mono); font-size:10px; color:var(--warn); background:var(--warn-bg); border-radius:6px; padding:2px 8px; }
  .top .hint { margin-left:auto; color:var(--mute); font-size:12px; font-family:var(--mono); }
  .wrap { max-width:1100px; margin:0 auto; padding:26px 22px 80px; }
  .stats { display:flex; gap:10px; margin-bottom:26px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; min-width:120px; }
  .stat .n { font-size:26px; font-weight:800; letter-spacing:-.02em; }
  .stat .l { font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--mute); margin-top:2px; }
  .stat.draft .n { color:var(--accent-ink); }
  .grp { font-family:var(--mono); font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--mute); margin:26px 2px 10px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  thead th { text-align:left; font-family:var(--mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--mute); font-weight:600; padding:9px 14px; border-bottom:1px solid var(--line); background:#fbfcff; }
  tbody td { padding:10px 14px; border-bottom:1px solid var(--line); font-size:13.5px; vertical-align:middle; }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr:hover { background:#fbfcff; }
  td.title a { color:var(--ink); font-weight:600; }
  td.title a:hover { color:var(--accent-ink); }
  .pill { font-family:var(--mono); font-size:10px; border-radius:999px; padding:2px 9px; white-space:nowrap; }
  .pill.pub { color:var(--ok); background:var(--ok-bg); border:1px solid #b6ead4; }
  .pill.draft { color:var(--accent-ink); background:var(--accent-weak); border:1px solid var(--accent-border); }
  td.stage, td.upd, td.ord { color:var(--sub); font-size:12.5px; }
  td.upd, td.ord { font-family:var(--mono); }
  td.act a { font-size:12px; color:var(--accent-ink); }
  .empty { color:var(--mute); padding:20px; }
  .foot { color:var(--mute); font-size:12px; font-family:var(--mono); margin-top:26px; }
</style>
</head>
<body>
  <div class="top">
    <b>AX 콘텐츠 현황<span class="dot">.</span></b>
    <span class="badge">로컬 전용 · 읽기</span>
    <span class="hint">편집·발행은 에이전트에게 — 여기선 상태만 본다</span>
  </div>
  <div class="wrap" id="wrap"><div class="empty">불러오는 중…</div></div>

<script type="module">
const CATS = ['개념·관점', '도구·기법', '패턴·플레이북'];
const esc = (s) => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const items = await fetch('/__admin/list').then(r=>r.json());
const pub = items.filter(i=>!i.draft).length;
const draft = items.filter(i=>i.draft).length;

const byCat = {};
for (const it of items) (byCat[it.category] ||= []).push(it);
const cats = [...CATS, ...Object.keys(byCat).filter(c=>!CATS.includes(c))];

let html = `<div class="stats">
  <div class="stat"><div class="n">${items.length}</div><div class="l">전체</div></div>
  <div class="stat"><div class="n">${pub}</div><div class="l">발행</div></div>
  <div class="stat draft"><div class="n">${draft}</div><div class="l">draft</div></div>
</div>`;

for (const c of cats) {
  const rows = byCat[c];
  if (!rows?.length) continue;
  html += `<div class="grp">${esc(c)||'(분류 없음)'} · ${rows.length}</div><table>
    <thead><tr><th>제목</th><th>상태</th><th>성숙도</th><th>갱신</th><th>order</th><th></th></tr></thead><tbody>`;
  for (const it of rows) {
    html += `<tr>
      <td class="title"><a href="/guide/${esc(it.id)}" target="_blank">${esc(it.title)}</a></td>
      <td>${it.draft ? '<span class="pill draft">draft</span>' : '<span class="pill pub">발행</span>'}</td>
      <td class="stage">${esc(it.stage)||'—'}</td>
      <td class="upd">${esc(it.updated)||'—'}</td>
      <td class="ord">${it.order}</td>
      <td class="act"><a href="/guide/${esc(it.id)}" target="_blank">미리보기 ↗</a></td>
    </tr>`;
  }
  html += `</tbody></table>`;
}
html += `<div class="foot">draft 글은 공개 빌드에서 제외됩니다. 내용을 채우려면 에이전트에게 던지세요 — frontmatter·본문·발행(draft 해제)까지 처리됩니다.</div>`;
document.getElementById('wrap').innerHTML = html;
</script>
</body>
</html>
